name: Build YDN18 Optimizer APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle and generate wrapper
        run: |
          # Download Gradle 8.4
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle-dist.zip
          unzip -q gradle-dist.zip -d /opt/gradle
          GRADLE_BIN=/opt/gradle/gradle-8.4/bin/gradle
          chmod +x $GRADLE_BIN
          echo "Gradle version:"
          $GRADLE_BIN --version
          # Generate wrapper (creates gradlew + gradle/wrapper/gradle-wrapper.jar)
          $GRADLE_BIN wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew
          echo "Wrapper generated:"
          ls -la gradle/wrapper/
          ls -la gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"

      - name: Show APK info
        run: |
          echo "APK built:"
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: YDN18-Optimizer-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: YDN18-Optimizer-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
